- id: polycarbonate-geodesic
  name: Polycarbonate geodesic
  family: glazed
  costPerSqFt: "Kit ~$3k–30k"
  insulation: "~R-2.8 (5-wall); poor"
  diy: high
  light: translucent
  durability: "UV-yellows in ~20 yr; combustible"
  bestUse: "Greenhouse, sunroom, or glamping shell"
  pros:
    - "Translucent — floods the interior with diffuse daylight"
    - "Light panels; approachable kit assembly"
    - "Comparatively inexpensive per square foot"
  cons:
    - "Low insulation even in multi-wall sheet; big day/night swings"
    - "UV yellowing and hazing over ~20 years"
    - "Condensation-prone; needs deliberate ventilation"
  caveats:
    - "Great for plants and shoulder-season use; a poor thermal envelope for a year-round conditioned home."
  vendorUrl: "https://growingspaces.com/"
  sources:
    - "https://growingspaces.com/greenhouse-accessories/high-quality-polycarbonate-greenhouse/"
    - "https://domebliss.com/waterproofing-geodesic-domes-kits-leakage-solutions-best-practices/"

